spin_manifest_version = 2

[application]
authors = ["Pedro Costa <pcosta@akamai.com>"]
description = "A beginner friendly Akamai Functions Space Lab"
name = "space-portal"
version = "0.1.0"

[[trigger.http]]
route = "/..."
component = "space-portal"

[component.space-portal]
source = "dist/space-portal.wasm"
exclude_files = ["**/node_modules"]
allowed_outbound_hosts = [
    "http://api.open-notify.org:80",
    "http://flight-computer.spin.internal"
    ]
key_value_stores = ["default"]
[component.space-portal.build]
command = ["npm install", "npm run build"]
watch = ["src/**/*.ts"]

[[trigger.http]]
route = { private = true }
component = "flight-computer"

[component.flight-computer]
source = "flight-computer/target/wasm32-wasip1/release/flight_computer.wasm"
allowed_outbound_hosts = []
[component.flight-computer.build]
command = "cargo build --target wasm32-wasip1 --release"
workdir = "flight-computer"
watch = ["src/**/*.rs", "Cargo.toml"]

# ─── Injected by Spin Dashboard (KV Explorer) ────────────────────────────────
# This block is auto-generated and only present in the temporary manifest.
# The real spin.toml is not modified.

[component.dash-kv-explorer]
source = ".dash_kv_explorer.wasm"
key_value_stores = ["default"]

[[trigger.http]]
route = "/internal/kv-explorer/..."
component = "dash-kv-explorer"
